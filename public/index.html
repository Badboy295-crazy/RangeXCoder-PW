<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batches — RangeXCoder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0c16;
            --bg-card: #151833;
            --bg-search: #12142d;
            --accent-purple: #5c5be5;
            --accent-hover: #4a49c6;
            --text-white: #ffffff;
            --text-muted: #8e92b2;
            --price-green: #00ff66;
            --border-color: #20254e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); min-height: 100vh; padding: 25px; }
        .container { max-width: 1280px; margin: 0 auto; }
        
        .navbar { display: flex; align-items: center; margin-bottom: 25px; }
        .logo-box { background-color: var(--accent-purple); width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; margin-right: 12px; }
        .logo-text { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }

        .search-container { position: relative; width: 100%; margin-bottom: 20px; }
        .search-input { width: 100%; background-color: var(--bg-search); border: 1px solid var(--border-color); border-radius: 30px; padding: 16px 60px 16px 24px; color: var(--text-white); font-size: 16px; outline: none; }
        .search-input:focus { border-color: var(--accent-purple); }
        .search-input::placeholder { color: #4f537c; }
        .search-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background-color: var(--accent-purple); border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-white); }

        .tabs-container { display: flex; background-color: var(--bg-search); border-radius: 8px; margin-bottom: 30px; overflow: hidden; border: 1px solid var(--border-color); }
        .tab { flex: 1; text-align: center; padding: 16px; font-weight: 600; font-size: 16px; cursor: pointer; color: var(--text-muted); user-select: none; }
        .tab.active { background-color: var(--accent-purple); color: var(--text-white); }

        .batches-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .batch-card { background-color: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; }
        .batch-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px 20px; }
        .batch-title { font-size: 18px; font-weight: 800; color: var(--text-white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85%; }
        .fav-icon { font-size: 20px; cursor: pointer; color: var(--text-white); }
        .fav-icon.active { color: #ff3366; }

        .thumbnail-container { width: 100%; position: relative; padding-top: 56.25%; background-color: #0b0c16; margin-top: 12px; }
        .thumbnail-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .fallback-text-banner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1e224b 0%, #12142d 100%); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: var(--accent-purple); text-transform: uppercase; border: 1px dashed var(--border-color); }

        .card-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        .info-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-muted); }
        .info-row i { width: 18px; text-align: center; }
        .info-row.lang i { color: #a4a9cf; }
        .info-row.target i { color: #ffcc00; }
        .info-row.dates i { color: #ff5e5e; }
        .info-row.price i { color: #00ff66; }
        .date-flex { display: flex; width: 100%; justify-content: space-between; }
        .price-container { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
        .original-price { text-decoration: line-through; color: var(--text-muted); font-weight: 500; }
        .sale-price { color: var(--price-green); font-weight: 700; font-size: 16px; }

        .explore-btn { background-color: var(--accent-purple); color: var(--text-white); border: none; padding: 13px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: auto; width: 100%; transition: background-color 0.2s; }
        .explore-btn:hover { background-color: var(--accent-hover); }
        .status-msg { grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 18px; color: var(--text-muted); }

        @media (max-width: 992px) { .batches-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .batches-grid { grid-template-columns: 1fr; } .date-flex { flex-direction: column; gap: 8px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="navbar">
            <div class="logo-box">R</div>
            <div class="logo-text">RangeXCoder</div>
        </div>

        <div class="search-container">
            <input type="text" id="searchBar" class="search-input" placeholder="Search batches...">
            <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
        </div>

        <div class="tabs-container">
            <div class="tab active" id="tabTotal">Total Batches</div>
            <div class="tab" id="tabFav">Favourites</div>
        </div>

        <div class="batches-grid" id="batchesContainer">
            <div class="status-msg">Booting dynamic localhost engine...</div>
        </div>
    </div>

    <script>
        let allBatches = [];
        let filteredBatches = [];
        let favouriteBatches = JSON.parse(localStorage.getItem('rangexcoder_favs')) || [];
        let currentTab = 'total'; 

        let displayedCount = 0;
        const CHUNK_SIZE = 30; 
        let isHandlingScrollLoad = false;

        const batchesContainer = document.getElementById('batchesContainer');
        const searchBar = document.getElementById('searchBar');
        const searchBtn = document.getElementById('searchBtn');
        const tabTotal = document.getElementById('tabTotal');
        const tabFav = document.getElementById('tabFav');

        async function fetchBatches() {
            try {
                // Hit Node proxy instead of direct git endpoint
                const response = await fetch('/api/batches');
                const data = await response.json();
                allBatches = data.batches || data || [];
                renderSystem();
            } catch (error) {
                console.error(error);
                batchesContainer.innerHTML = `<div class="status-msg" style="color: #ff5e5e;">Failed to load batches from local engine proxy.</div>`;
            }
        }

        function renderSystem() {
            batchesContainer.innerHTML = '';
            displayedCount = 0;
            filteredBatches = [...allBatches];

            if (currentTab === 'fav') {
                filteredBatches = filteredBatches.filter(item => favouriteBatches.includes(item._id));
            }

            const searchQuery = searchBar.value.toLowerCase().trim();
            if (searchQuery !== '') {
                filteredBatches = filteredBatches.filter(item => 
                    (item.name && item.name.toLowerCase().includes(searchQuery)) || 
                    (item.byName && item.byName.toLowerCase().includes(searchQuery))
                );
            }

            if (filteredBatches.length === 0) {
                batchesContainer.innerHTML = `<div class="status-msg">No batches matched your criteria.</div>`;
                return;
            }

            renderNextStageChunk();
        }

        function renderNextStageChunk() {
            const nextChunkData = filteredBatches.slice(displayedCount, displayedCount + CHUNK_SIZE);
            if (nextChunkData.length === 0) return;

            const fragment = document.createDocumentFragment();

            nextChunkData.forEach(batch => {
                const isFav = favouriteBatches.includes(batch._id);
                const cardDiv = document.createElement('div');
                cardDiv.className = 'batch-card';
                
                let mediaHTML = `<div class="fallback-text-banner">RangeXCoder</div>`;
                if (batch.previewImage && batch.previewImage.trim() !== '') {
                    mediaHTML = `<img src="${batch.previewImage}" alt="${batch.name}" class="thumbnail-img" onerror="handleImageError(this);">`;
                }

                // Dynamic routing to localhost workspace context
                const targetLink = `/subjects.html?batchId=${batch._id}&batchName=${encodeURIComponent(batch.name)}`;

                cardDiv.innerHTML = `
                    <div class="card-header">
                        <div class="batch-title" title="${batch.name}">${batch.name}</div>
                        <i class="${isFav ? 'fas' : 'far'} fa-heart fav-icon ${isFav ? 'active' : ''}" data-id="${batch._id}"></i>
                    </div>
                    <div class="thumbnail-container">${mediaHTML}</div>
                    <div class="card-body">
                        <div class="info-row lang"><i class="fas fa-user-friends"></i><span>${batch.language || 'Hinglish'}</span></div>
                        <div class="info-row target"><i class="fas fa-trophy"></i><span>${batch.byName || 'For IIT-JEE Aspirants'}</span></div>
                        <div class="info-row dates">
                            <div class="date-flex">
                                <div><i class="far fa-calendar-alt"></i> Start: ${batch.startDate || 'TBD'}</div>
                                <div><i class="far fa-calendar-alt"></i> End: ${batch.endDate || 'TBD'}</div>
                            </div>
                        </div>
                        <div class="info-row price"><i class="fas fa-wallet"></i>
                            <div class="price-container">
                                <span class="original-price">₹${batch.feeTotal || '4999'}</span>
                                <span class="sale-price">₹0</span>
                            </div>
                        </div>
                        <button class="explore-btn" onclick="window.location.href='${targetLink}'">Explore</button>
                    </div>
                `;
                fragment.appendChild(cardDiv);
            });

            batchesContainer.appendChild(fragment);
            displayedCount += nextChunkData.length;
            isHandlingScrollLoad = false;
        }

        function handleImageError(imgNode) {
            if(imgNode.parentElement) {
                imgNode.parentElement.innerHTML = `<div class="fallback-text-banner">RangeXCoder</div>`;
            }
        }

        window.addEventListener('scroll', () => {
            if (isHandlingScrollLoad) return;
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 300) {
                if (displayedCount < filteredBatches.length) {
                    isHandlingScrollLoad = true;
                    renderNextStageChunk();
                }
            }
        });

        batchesContainer.addEventListener('click', function(e) {
            if (e.target.classList.contains('fav-icon')) {
                const id = e.target.getAttribute('data-id');
                if (favouriteBatches.includes(id)) {
                    favouriteBatches = favouriteBatches.filter(i => i !== id);
                } else {
                    favouriteBatches.push(id);
                }
                localStorage.setItem('rangexcoder_favs', JSON.stringify(favouriteBatches));
                renderSystem();
            }
        });

        searchBar.addEventListener('input', renderSystem);
        tabTotal.addEventListener('click', () => { tabTotal.className='tab active'; tabFav.className='tab'; currentTab='total'; renderSystem(); });
        tabFav.addEventListener('click', () => { tabFav.className='tab active'; tabTotal.className='tab'; currentTab='fav'; renderSystem(); });
        window.addEventListener('DOMContentLoaded', fetchBatches);
    </script>
</body>
</html>
