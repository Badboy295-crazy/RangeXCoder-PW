<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Moved Successfully</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            border: 1px solid #334155;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🔗</div>
        
        <h1>This Domain is No Longer Active</h1>
        
        <p>This website has officially moved to a new permanent address. From now on, you can access all our content and services on our main website.</p>
        
        <a href="https://rangexcoder.netlify.app/" class="btn">Open Main Website</a>
    </div>

</body>
</html>
