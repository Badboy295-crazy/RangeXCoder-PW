<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Workspace — RangeXCoder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0c16;
            --bg-card: #151833;
            --bg-dark-tabs: #0e1022;
            --accent-purple: #5c5be5;
            --text-white: #ffffff;
            --text-muted: #8e92b2;
            --border-color: #1e234a;
            --action-blue: #0084ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); min-height: 100vh; }
        
        .header-backbar { background-color: var(--bg-main); padding: 18px 24px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: var(--text-white); font-size: 20px; text-decoration: none; cursor: pointer; }
        .chapter-headline-title { font-size: 20px; font-weight: 800; }

        .workspace-tabs-row { display: flex; background-color: var(--bg-dark-tabs); border-bottom: 1px solid var(--border-color); overflow-x: auto; position: sticky; top: 62px; z-index: 99; }
        .tab-node { flex: 1; text-align: center; padding: 16px 10px; font-weight: 700; font-size: 14px; color: var(--text-muted); cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; }
        .tab-node.active-node { color: var(--text-white); border-bottom: 3px solid var(--accent-purple); background-color: rgba(92, 91, 229, 0.03); }

        .stream-deck-content { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }

        .lecture-row-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; display: flex; gap: 20px; padding: 14px; align-items: center; cursor: pointer; }
        .lecture-image-box { width: 180px; height: 102px; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; background-color: #000; }
        .lecture-image-box img { width: 100%; height: 100%; object-fit: cover; }
        .lecture-duration-overlay { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.8); padding: 2px 6px; font-size: 10px; border-radius: 4px; font-weight: 700; }
        .lecture-text-box { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .lecture-title-h3 { font-size: 15px; font-weight: 700; color: var(--text-white); line-height: 1.4; }
        .lecture-meta-span { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .lecture-check-icon { margin-left: auto; padding-right: 10px; color: #323963; font-size: 20px; }

        .sheet-row-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .sheet-left-composite { display: flex; align-items: center; gap: 20px; }
        .sheet-avatar-icon-box { width: 44px; height: 44px; background-color: rgba(92, 91, 229, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #7978e9; font-size: 20px; border: 1px solid rgba(92, 91, 229, 0.2); }
        .sheet-text-composite { display: flex; flex-direction: column; gap: 4px; }
        .sheet-title-h3 { font-size: 15px; font-weight: 700; color: var(--text-white); }
        .sheet-meta-span { font-size: 12px; color: var(--text-muted); }
        .sheet-chevron-icon { color: var(--accent-purple); font-size: 16px; padding-right: 4px; }

        .quiz-row-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .quiz-details-box { display: flex; flex-direction: column; gap: 8px; }
        .quiz-title-h3 { font-size: 15px; font-weight: 700; }
        .quiz-stats-row { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .quiz-action-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--action-blue); }
        .quiz-action-btn i { font-size: 32px; }
        .quiz-action-btn span { font-size: 11px; font-weight: 700; text-transform: uppercase; }

        .empty-rocket-pane { text-align: center; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .empty-rocket-pane i { font-size: 52px; color: #f2aa4c; transform: rotate(45deg); }
        .empty-heading { font-size: 20px; font-weight: 800; }
        .empty-subtext { font-size: 14px; color: var(--text-muted); }
        .status-msg { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="header-backbar">
        <div class="back-btn" id="streamBackBtn"><i class="fas fa-chevron-left"></i></div>
        <div class="chapter-headline-title" id="chapterNavbarTitle">Loading Chapter...</div>
    </div>

    <div class="workspace-tabs-row" id="tabsNavigatorBar">
        <div class="tab-node active-node" data-section="videos">Lectures</div>
        <div class="tab-node" data-section="notes">Notes</div>
        <div class="tab-node" data-section="dpp">DPP</div>
        <div class="tab-node" data-section="dpp-pdf">DPP PDF</div>
        <div class="tab-node" data-section="dpp-videos">DPP Videos</div>
    </div>

    <div class="stream-deck-content" id="streamContentDeck">
        <div class="status-msg">Streaming content array...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const BATCH_ID = urlParams.get('batchId');
        const SUBJECT_ID = urlParams.get('subjectId');
        const SUBJECT_SLUG = urlParams.get('subjectSlug') || "";
        const CHAPTER_ID = urlParams.get('chapterId');
        const BATCH_NAME = urlParams.get('batchName');
        const SUBJECT_NAME = urlParams.get('subjectName');
        const CHAPTER_NAME = urlParams.get('chapterName') || "Workspace Terminal";
        let activeSection = urlParams.get('section') || "videos";

        document.getElementById('chapterNavbarTitle').innerText = CHAPTER_NAME;

        document.getElementById('streamBackBtn').onclick = () => {
            window.location.href = `/content?batchId=${BATCH_ID}&subjectId=${SUBJECT_ID}&subjectSlug=${encodeURIComponent(SUBJECT_SLUG)}&subjectName=${encodeURIComponent(SUBJECT_NAME)}&batchName=${encodeURIComponent(BATCH_NAME)}`;
        };

        function initTabsHighlight() {
            const tabs = document.querySelectorAll('.tab-node');
            tabs.forEach(t => {
                if (t.getAttribute('data-section') === activeSection) { t.classList.add('active-node'); } 
                else { t.classList.remove('active-node'); }
                
                t.onclick = function() {
                    activeSection = this.getAttribute('data-section');
                    tabs.forEach(item => item.classList.remove('active-node'));
                    this.classList.add('active-node');
                    loadActiveSectionStream();
                };
            });
        }

        async function loadActiveSectionStream() {
            const container = document.getElementById('streamContentDeck');
            container.innerHTML = `<div class="status-msg">Loading section index array...</div>`;

            try {
                if (activeSection === 'dpp') {
                    const response = await fetch(`/api/dpp-tests?batchId=${BATCH_ID}&batchSubjectId=${SUBJECT_ID}&chapterId=${CHAPTER_ID}`);
                    const resData = await response.json();
                    renderQuizLayout(resData.data || []);
                } else {
                    let mappedType = 'videos';
                    if (activeSection === 'notes') mappedType = 'notes';
                    if (activeSection === 'dpp-pdf') mappedType = 'DppNotes';
                    if (activeSection === 'dpp-videos') mappedType = 'DppVideos';

                    const response = await fetch(`/api/contents?batchId=${BATCH_ID}&subjectId=${SUBJECT_ID}&contentType=${mappedType}&tag=${CHAPTER_ID}`);
                    const resData = await response.json();
                    
                    if (activeSection === 'videos') renderLecturesLayout(resData.data || []);
                    else if (activeSection === 'notes' || activeSection === 'dpp-pdf') renderSheetsLayout(resData.data || [], activeSection === 'dpp-pdf');
                    else renderEmptyRocketState();
                }
            } catch (error) {
                renderEmptyRocketState();
            }
        }

        function renderLecturesLayout(items) {
            const container = document.getElementById('streamContentDeck');
            if (items.length === 0) { return renderEmptyRocketState(); }
            container.innerHTML = '';

            items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'lecture-row-card';
                
                // SECURE REDIRECTION WITH TOKEN IN NEW TAB
                row.onclick = async () => {
                    try {
                        const response = await fetch(`/api/get-token?type=video&batchId=${BATCH_ID}&subjectId=${SUBJECT_ID}&scheduleId=${item._id}`);
                        const resData = await response.json();
                        if (resData.success && resData.token) {
                            window.open(`/watch?token=${encodeURIComponent(resData.token)}`, '_blank');
                        }
                    } catch (error) {
                        console.error("Failed to generate stream token:", error);
                    }
                };

                // COMPREHENSIVE FIX FOR THUMBNAIL GRAPHIC RENDERING ANOMALIES
                let imgUrl = "https://static.pw.live/5eb393ee95fab7468a79d189/ADMIN/17269a0b-7739-4e6b-b9c7-c4f4939d303e.png";
                if (item.videoDetails && item.videoDetails.image) { imgUrl = item.videoDetails.image; }

                const duration = item.videoDetails?.duration || "02:08:52";
                let cleanDate = "11 May, 2026";
                if(item.date) { try { cleanDate = new Date(item.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); } catch(e){} }

                row.innerHTML = `
                    <div class="lecture-image-box">
                        <img src="${imgUrl}" alt="Lecture Graphic Thumbnail" onerror="this.src='https://via.placeholder.com/180x102/151833/ffffff?text=Lecture';">
                        <div class="lecture-duration-overlay">${duration}</div>
                    </div>
                    <div class="lecture-text-box">
                        <div class="lecture-title-h3">${item.topic}</div>
                        <div class="lecture-meta-span">${duration} • ${cleanDate}</div>
                    </div>
                    <div class="lecture-check-icon"><i class="far fa-check-circle"></i></div>
                `;
                container.appendChild(row);
            });
        }

        function renderSheetsLayout(items, isDpp = false) {
            const container = document.getElementById('streamContentDeck');
            if (items.length === 0) { return renderEmptyRocketState(); }
            container.innerHTML = '';

            items.forEach(item => {
                const hw = item.homeworkIds?.[0];
                if (!hw) return;
                const row = document.createElement('div');
                row.className = 'sheet-row-card';
                row.onclick = async () => {
                    try {
                        const response = await fetch(`/api/get-token?type=${isDpp ? 'dpp-pdf' : 'note'}&batchId=${BATCH_ID}&subjectId=${SUBJECT_ID}&scheduleId=${item._id}`);
                        const resData = await response.json();
                        if (resData.success && resData.token) {
                            window.open(`/api/play?token=${encodeURIComponent(resData.token)}`, '_blank');
                        }
                    } catch (error) {
                        console.error("Failed to generate sheet token:", error);
                    }
                };

                row.innerHTML = `
                    <div class="sheet-left-composite">
                        <div class="sheet-avatar-icon-box"><i class="far fa-file-alt"></i></div>
                        <div class="sheet-text-composite">
                            <div class="sheet-title-h3">${hw.topic}</div>
                            <div class="sheet-meta-span">${isDpp ? 'DPP Attachment' : 'Class Attachment'}</div>
                        </div>
                    </div>
                    <div class="sheet-chevron-icon"><i class="fas fa-chevron-right"></i></div>
                `;
                container.appendChild(row);
            });
        }

        function renderQuizLayout(items) {
            const container = document.getElementById('streamContentDeck');
            if (items.length === 0) { return renderEmptyRocketState(); }
            container.innerHTML = '';

            items.forEach(item => {
                const test = item.test;
                if (!test) return;
                const row = document.createElement('div');
                row.className = 'quiz-row-card';
                
                const scheduleId = item.scheduleId || item._id || "";
                const testId = test._id || test.id || "";
                const tagText = item.tag || "Start";
                
                row.onclick = async () => {
                    try {
                        const response = await fetch(`/api/get-token?type=dpp-quiz&batchId=${BATCH_ID}&scheduleId=${scheduleId}&testId=${testId}&tag=${encodeURIComponent(tagText)}`);
                        const resData = await response.json();
                        if (resData.success && resData.token) {
                            window.open(`/api/play?token=${encodeURIComponent(resData.token)}`, '_blank');
                        }
                    } catch (error) {
                        console.error("Failed to generate quiz token:", error);
                    }
                };

                row.innerHTML = `
                    <div class="quiz-details-box">
                        <div class="quiz-title-h3">${test.name}</div>
                        <div class="quiz-stats-row">
                            <span><i class="far fa-file-alt"></i> ${test.totalQuestions} questions</span>
                            <span><i class="far fa-star"></i> ${test.totalMarks} Marks</span>
                        </div>
                    </div>
                    <button class="quiz-action-btn" style="pointer-events: none;">
                        <i class="far fa-play-circle" style="color: #5c5be5"></i>
                        <span>${tagText}</span>
                    </button>
                `;
                container.appendChild(row);
            });
        }

        function renderEmptyRocketState() {
            document.getElementById('streamContentDeck').innerHTML = `
                <div class="empty-rocket-pane">
                    <i class="fas fa-rocket"></i>
                    <div class="empty-heading">Coming Soon</div>
                    <div class="empty-subtext">Content will be available soon!</div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', () => { initTabsHighlight(); loadActiveSectionStream(); });
    </script>
</body>
</html>
